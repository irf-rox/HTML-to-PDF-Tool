<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML to PDF · Quadrasystems</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  /* Orange brand */
  --brand:        #FF5805;
  --brand-2:      #FF7A33;
  --brand-3:      #FFAA70;
  --brand-soft:   #FFEDE2;
  --brand-tint:   #FFF6F0;

  /* Surfaces */
  --surface:      #FFFFFF;
  --surface-2:    #FAFAFC;
  --surface-3:    #F3F2F7;

  --border:       #ECEAF2;
  --border-2:     #DEDBE8;
  --divider:      #F1EFF6;

  /* Ink */
  --ink:          #1A1730;
  --ink-2:        #4D4866;
  --ink-3:        #8983A0;
  --ink-4:        #BAB5CC;

  /* Status */
  --success:      #16A36B;
  --danger:       #E5395A;

  --sans: 'Sora', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

  --r-sm: 10px;
  --r:    14px;
  --r-lg: 20px;
  --r-pill: 999px;

  --shadow-xs: 0 1px 2px rgba(26,23,48,0.04);
  --shadow-sm: 0 2px 6px rgba(26,23,48,0.05), 0 1px 2px rgba(26,23,48,0.03);
  --shadow:    0 12px 36px rgba(26,23,48,0.08), 0 2px 6px rgba(26,23,48,0.04);
  --shadow-brand: 0 8px 20px rgba(255,88,5,0.28), 0 2px 6px rgba(255,88,5,0.16);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; font-family: var(--sans); }

body {
  color: var(--ink);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  position: relative;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ═══════════ ABSTRACT GRADIENT BACKGROUND ═══════════ */
.bg {
  position: fixed;
  inset: 0;
  z-index: -1;
  overflow: hidden;
  background:
    linear-gradient(135deg, #EAF1FC 0%, #F4E9FB 45%, #FBE9E0 100%);
}

.bg::before {
  content: '';
  position: absolute;
  width: 700px; height: 700px;
  top: -260px; left: -240px;
  background: radial-gradient(circle, rgba(165,180,252,0.55) 0%, rgba(165,180,252,0) 65%);
  border-radius: 50%;
  filter: blur(20px);
}

.bg::after {
  content: '';
  position: absolute;
  width: 760px; height: 760px;
  bottom: -300px; right: -280px;
  background: radial-gradient(circle, rgba(255,170,112,0.55) 0%, rgba(255,170,112,0) 65%);
  border-radius: 50%;
  filter: blur(20px);
}

.bg-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(40px);
  opacity: 0.55;
}

.bg-orb-1 {
  width: 480px; height: 480px;
  top: 30%; left: 50%;
  transform: translateX(-50%);
  background: radial-gradient(circle, rgba(214,189,255,0.65) 0%, rgba(214,189,255,0) 65%);
}

.bg-orb-2 {
  width: 360px; height: 360px;
  top: 8%; right: 8%;
  background: radial-gradient(circle, rgba(255,209,180,0.5) 0%, rgba(255,209,180,0) 65%);
}

.bg-grain {
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(circle at 1px 1px, rgba(26,23,48,0.025) 1px, transparent 0);
  background-size: 24px 24px;
  opacity: 0.7;
}

/* ═══════════ PAGE ═══════════ */
.page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 48px 24px 56px;
}

/* ═══════════ TOP BAR ═══════════ */
.topbar {
  width: 100%;
  max-width: 600px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 11px;
}

.brand-mark {
  width: 36px; height: 36px;
  border-radius: 11px;
  background: linear-gradient(135deg, var(--brand) 0%, var(--brand-3) 100%);
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  font-weight: 700;
  font-size: 16px;
  letter-spacing: -0.5px;
  box-shadow: var(--shadow-brand);
}

.brand-text {
  display: flex;
  flex-direction: column;
  line-height: 1.1;
}

.brand-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: -0.2px;
}

.brand-sub {
  font-size: 11.5px;
  font-weight: 400;
  color: var(--ink-3);
  margin-top: 2px;
}

.status {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 7px 14px;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.6);
  border-radius: var(--r-pill);
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-2);
}

.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--success);
  box-shadow: 0 0 0 3px rgba(22,163,107,0.18);
}

/* ═══════════ HERO ILLUSTRATION ═══════════ */
.hero-vis {
  position: relative;
  width: 100%;
  max-width: 600px;
  display: flex;
  justify-content: center;
  margin-bottom: -52px;
  z-index: 2;
  pointer-events: none;
}

.hero-vis svg {
  width: 200px;
  height: 130px;
  filter: drop-shadow(0 16px 32px rgba(255,88,5,0.15)) drop-shadow(0 4px 10px rgba(26,23,48,0.06));
}

/* ═══════════ CARD ═══════════ */
.card {
  width: 100%;
  max-width: 600px;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.7);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow);
  overflow: hidden;
  position: relative;
}

/* ═══ Card header ═══ */
.card-head {
  padding: 78px 32px 22px;
  text-align: center;
}

.card-title {
  font-size: 24px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.6px;
  line-height: 1.25;
}

.card-title em {
  font-style: normal;
  background: linear-gradient(135deg, var(--brand) 0%, var(--brand-2) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  font-weight: 700;
}

.card-sub {
  margin-top: 8px;
  font-size: 13.5px;
  color: var(--ink-3);
  font-weight: 400;
  line-height: 1.55;
  max-width: 420px;
  margin-left: auto;
  margin-right: auto;
}

/* ═══ Segmented tabs ═══ */
.tabs {
  padding: 8px 32px 0;
}

.segmented {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
  padding: 5px;
  background: var(--surface-3);
  border-radius: var(--r-pill);
}

.seg-btn {
  appearance: none;
  border: 0;
  background: transparent;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-2);
  padding: 9px 14px;
  border-radius: var(--r-pill);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.18s ease;
}

.seg-btn:hover { color: var(--ink); }

.seg-btn.active {
  background: var(--surface);
  color: var(--brand);
  font-weight: 600;
  box-shadow: 0 1px 2px rgba(26,23,48,0.06), 0 0 0 1px rgba(255,88,5,0.12);
}

.seg-btn svg { flex-shrink: 0; }

/* ═══ Body ═══ */
.body {
  padding: 20px 32px 24px;
}

.panel { display: none; }
.panel.active { display: block; }

/* ═══ Drop zone ═══ */
.drop-zone {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 38px 24px;
  background:
    linear-gradient(135deg, rgba(255,237,226,0.55) 0%, rgba(255,255,255,0.6) 100%);
  border: 1.5px dashed rgba(255,88,5,0.3);
  border-radius: var(--r);
  cursor: pointer;
  transition: all 0.2s ease;
}

.drop-zone:hover,
.drop-zone.dragover {
  background:
    linear-gradient(135deg, rgba(255,237,226,0.9) 0%, rgba(255,246,240,0.9) 100%);
  border-color: var(--brand);
  transform: translateY(-1px);
}

.drop-zone input[type=file] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
}

.drop-icon-wrap {
  position: relative;
  width: 56px; height: 56px;
  border-radius: 16px;
  background: linear-gradient(135deg, var(--brand) 0%, var(--brand-3) 100%);
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  box-shadow: var(--shadow-brand);
}

.drop-icon-wrap::after {
  content: '';
  position: absolute;
  inset: -6px;
  border-radius: 22px;
  background: radial-gradient(circle, rgba(255,88,5,0.18) 0%, rgba(255,88,5,0) 70%);
  z-index: -1;
}

.drop-text { text-align: center; }

.drop-title {
  font-size: 14.5px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: -0.15px;
}

.drop-link {
  color: var(--brand);
  text-decoration: none;
  font-weight: 600;
}

.drop-sub {
  font-size: 12px;
  color: var(--ink-3);
  margin-top: 4px;
  font-weight: 400;
}

/* ═══ File loaded ═══ */
.file-loaded {
  display: none;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: rgba(255,237,226,0.6);
  border: 1px solid rgba(255,88,5,0.2);
  border-radius: var(--r);
}

.file-loaded.show { display: flex; }

.fl-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--brand) 0%, var(--brand-2) 100%);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 4px 10px rgba(255,88,5,0.25);
}

.fl-info { flex: 1; min-width: 0; }

.fl-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.fl-meta {
  font-size: 11.5px;
  color: var(--ink-3);
  margin-top: 2px;
  font-weight: 400;
}

.rm-btn {
  background: transparent;
  border: 0;
  color: var(--ink-3);
  font-family: inherit;
  cursor: pointer;
  padding: 7px;
  border-radius: var(--r-pill);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}

.rm-btn:hover {
  color: var(--danger);
  background: rgba(229,57,90,0.08);
}

/* ═══ Paste textarea ═══ */
.paste-input {
  width: 100%;
  min-height: 200px;
  resize: vertical;
  background: rgba(250,250,252,0.7);
  border: 1px solid var(--border);
  border-radius: var(--r);
  color: var(--ink);
  font-family: ui-monospace, 'SF Mono', Menlo, monospace;
  font-size: 12.5px;
  line-height: 1.7;
  padding: 14px 16px;
  outline: none;
  transition: all 0.18s ease;
}

.paste-input:focus {
  border-color: var(--brand);
  background: var(--surface);
  box-shadow: 0 0 0 3px rgba(255,88,5,0.1);
}

.paste-input::placeholder { color: var(--ink-4); }

/* ═══ Card footer ═══ */
.card-foot {
  padding: 18px 32px 24px;
  border-top: 1px solid var(--divider);
  background: rgba(250,250,252,0.5);
  display: flex;
  align-items: center;
  gap: 12px;
}

.fname-field {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
}

.fname-prefix {
  position: absolute;
  left: 16px;
  color: var(--ink-4);
  pointer-events: none;
  display: flex;
  align-items: center;
}

.fname-input {
  flex: 1;
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-pill);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  padding: 11px 18px 11px 42px;
  outline: none;
  transition: all 0.18s ease;
}

.fname-input:focus {
  border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(255,88,5,0.1);
}

.fname-input::placeholder { color: var(--ink-4); font-weight: 400; }

/* ═══ Primary action — pill button ═══ */
.action {
  appearance: none;
  border: 0;
  background: linear-gradient(135deg, var(--brand) 0%, var(--brand-2) 100%);
  color: #fff;
  font-family: var(--sans);
  font-size: 13.5px;
  font-weight: 600;
  letter-spacing: -0.1px;
  padding: 12px 22px;
  border-radius: var(--r-pill);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 9px;
  transition: all 0.2s ease;
  white-space: nowrap;
  box-shadow: var(--shadow-brand);
  position: relative;
  overflow: hidden;
}

.action::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--brand-2) 0%, var(--brand) 100%);
  opacity: 0;
  transition: opacity 0.25s ease;
}

.action span,
.action svg { position: relative; z-index: 1; }

.action:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 28px rgba(255,88,5,0.34), 0 3px 8px rgba(255,88,5,0.2);
}

.action:hover::after { opacity: 1; }

.action:active { transform: translateY(0); }

.action:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

/* ═══════════ Bottom note ═══════════ */
.bottom-note {
  margin-top: 18px;
  max-width: 600px;
  width: 100%;
  text-align: center;
  font-size: 12px;
  font-weight: 400;
  color: var(--ink-2);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
}

.bottom-note svg { color: var(--brand); }

/* ═══════════ Toast ═══════════ */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink);
  color: #fff;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  padding: 12px 20px;
  border-radius: var(--r-pill);
  box-shadow: 0 14px 36px rgba(0,0,0,0.22);
  opacity: 0;
  pointer-events: none;
  transition: all 0.22s ease;
  z-index: 50;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ═══════════ Spinner ═══════════ */
@keyframes spin { to { transform: rotate(360deg); } }
.spin { animation: spin 0.9s linear infinite; transform-origin: center; }

/* ═══════════ Responsive ═══════════ */
@media (max-width: 600px) {
  .page { padding: 24px 16px 36px; }
  .card-head { padding: 70px 22px 18px; }
  .body, .tabs, .card-foot { padding-left: 22px; padding-right: 22px; }
  .card-foot { flex-direction: column; align-items: stretch; }
  .action { justify-content: center; }
  .hero-vis svg { width: 160px; height: 110px; }
  .card-title { font-size: 21px; }
}

/* ═══════════ Print ═══════════ */
@page { size: A4; margin: 0; }

@media print {
  body, .bg { background: #fff !important; }
  .bg::before, .bg::after, .bg-orb, .bg-grain { display: none; }
  .page { padding: 0; }
  .card { box-shadow: none; border-radius: 0; max-width: 100%; backdrop-filter: none; background: #fff; }
  .action, .rm-btn, .toast { display: none; }
}
</style>
</head>
<body>

<!-- ═══════════ Background ═══════════ -->
<div class="bg">
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-grain"></div>
</div>

<div class="page">

  <!-- ═══ Top bar ═══ -->
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">Q</div>
      <div class="brand-text">
        <span class="brand-name">Quadrasystems</span>
        <span class="brand-sub">PDF Export Engine</span>
      </div>
    </div>

    <div class="status">
      <span class="status-dot"></span>
      Ready
    </div>
  </header>

  <!-- ═══ Hero illustration ═══ -->
  <div class="hero-vis" aria-hidden="true">
    <svg viewBox="0 0 220 140" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="docGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="100%" stop-color="#FFF6F0"/>
        </linearGradient>
        <linearGradient id="pdfGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#FF5805"/>
          <stop offset="100%" stop-color="#FF7A33"/>
        </linearGradient>
        <linearGradient id="codeGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#F4E9FB"/>
          <stop offset="100%" stop-color="#EAF1FC"/>
        </linearGradient>
      </defs>

      <!-- HTML/code document (left) -->
      <g transform="translate(20 22) rotate(-8 40 50)">
        <rect x="0" y="0" width="74" height="92" rx="10" fill="url(#codeGrad)" stroke="#E3DFEE" stroke-width="1"/>
        <rect x="10" y="14" width="42" height="4" rx="2" fill="#C7BFE0"/>
        <rect x="10" y="24" width="54" height="3" rx="1.5" fill="#D8D1E8"/>
        <rect x="10" y="32" width="48" height="3" rx="1.5" fill="#D8D1E8"/>
        <rect x="10" y="40" width="38" height="3" rx="1.5" fill="#D8D1E8"/>
        <rect x="10" y="48" width="50" height="3" rx="1.5" fill="#D8D1E8"/>
        <rect x="10" y="56" width="32" height="3" rx="1.5" fill="#D8D1E8"/>
        <rect x="10" y="64" width="44" height="3" rx="1.5" fill="#D8D1E8"/>
        <rect x="10" y="72" width="40" height="3" rx="1.5" fill="#D8D1E8"/>
        <text x="37" y="86" font-family="Sora, sans-serif" font-size="6" font-weight="700" fill="#A32DCD" text-anchor="middle" letter-spacing="0.4">&lt;HTML/&gt;</text>
      </g>

      <!-- Arrow / spark -->
      <g transform="translate(102 60)">
        <path d="M0 10 L14 10 M10 6 L14 10 L10 14" stroke="#FF5805" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <circle cx="2" cy="2" r="1.6" fill="#FF7A33" opacity="0.7"/>
        <circle cx="6" cy="18" r="1.2" fill="#FF5805" opacity="0.5"/>
      </g>

      <!-- PDF document (right) -->
      <g transform="translate(122 18) rotate(8 40 52)">
        <rect x="0" y="0" width="78" height="96" rx="10" fill="url(#docGrad)" stroke="#FFD4B8" stroke-width="1"/>
        <rect x="0" y="0" width="78" height="22" rx="10" fill="url(#pdfGrad)"/>
        <rect x="0" y="14" width="78" height="8" fill="url(#pdfGrad)"/>
        <text x="39" y="15" font-family="Sora, sans-serif" font-size="9" font-weight="700" fill="#fff" text-anchor="middle" letter-spacing="0.8">PDF</text>

        <rect x="11" y="34" width="56" height="3.5" rx="1.75" fill="#1A1730" opacity="0.7"/>
        <rect x="11" y="44" width="48" height="2.5" rx="1.25" fill="#1A1730" opacity="0.18"/>
        <rect x="11" y="50" width="54" height="2.5" rx="1.25" fill="#1A1730" opacity="0.18"/>
        <rect x="11" y="56" width="42" height="2.5" rx="1.25" fill="#1A1730" opacity="0.18"/>
        <rect x="11" y="66" width="50" height="2.5" rx="1.25" fill="#1A1730" opacity="0.18"/>
        <rect x="11" y="72" width="36" height="2.5" rx="1.25" fill="#1A1730" opacity="0.18"/>

        <rect x="11" y="82" width="22" height="6" rx="3" fill="#FFEDE2"/>
        <rect x="14" y="84" width="16" height="2" rx="1" fill="#FF5805"/>
      </g>
    </svg>
  </div>

  <!-- ═══ Main card ═══ -->
  <main class="card">

    <div class="card-head">
      <h1 class="card-title">Turn HTML into <em>PDF</em></h1>
      <p class="card-sub">Upload a file or paste markup — we'll render it into a clean, single-page PDF.</p>
    </div>

    <!-- Segmented tabs -->
    <div class="tabs">
      <div class="segmented" role="tablist">
        <button class="seg-btn active" id="tab-file" onclick="switchMode('file')" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          Upload file
        </button>
        <button class="seg-btn" id="tab-paste" onclick="switchMode('paste')" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
            <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
          </svg>
          Paste HTML
        </button>
      </div>
    </div>

    <!-- Body -->
    <div class="body">

      <!-- File panel -->
      <div class="panel active" id="panel-file">
        <div class="drop-zone" id="drop-zone">
          <input type="file" id="file-input" accept=".html,.htm" onchange="onFileSelect(this.files[0])">
          <div class="drop-icon-wrap">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
          </div>
          <div class="drop-text">
            <div class="drop-title">Drop a file here, or <span class="drop-link">browse</span></div>
            <div class="drop-sub">Supports .html and .htm</div>
          </div>
        </div>

        <div class="file-loaded" id="file-loaded">
          <div class="fl-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
          <div class="fl-info">
            <div class="fl-name" id="file-loaded-name">—</div>
            <div class="fl-meta" id="file-loaded-meta">—</div>
          </div>
          <button class="rm-btn" onclick="clearFile()" aria-label="Remove file" title="Remove">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Paste panel -->
      <div class="panel" id="panel-paste">
        <textarea class="paste-input" id="paste-input" placeholder="<!DOCTYPE html>
<html>
  <head>...</head>
  <body>...</body>
</html>"></textarea>
      </div>

    </div>

    <!-- Footer: filename + action -->
    <div class="card-foot">
      <div class="fname-field">
        <span class="fname-prefix">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
        </span>
        <input class="fname-input" id="fname" type="text" placeholder="output.pdf" value="output.pdf">
      </div>

      <button class="action" id="export-btn" onclick="exportPDF()" type="button">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span>Download PDF</span>
      </button>
    </div>

  </main>

  <!-- ═══ Bottom note ═══ -->
  <div class="bottom-note">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
    Processed locally — your files never leave this browser.
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
let mode = 'file';
let loadedFile = null;
let loadedHTML = '';

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(function() { t.classList.remove('show'); }, 2600);
}

function switchMode(m) {
  mode = m;
  document.getElementById('tab-file').classList.toggle('active', m === 'file');
  document.getElementById('tab-paste').classList.toggle('active', m === 'paste');
  document.getElementById('panel-file').classList.toggle('active', m === 'file');
  document.getElementById('panel-paste').classList.toggle('active', m === 'paste');
}

function resetBtn() {
  var b = document.getElementById('export-btn');
  b.disabled = false;
  if (b.dataset.original) b.innerHTML = b.dataset.original;
}

/* ── File handling ── */
const dropZone = document.getElementById('drop-zone');

dropZone.addEventListener('dragover', function(e) {
  e.preventDefault();
  dropZone.classList.add('dragover');
});
dropZone.addEventListener('dragleave', function() {
  dropZone.classList.remove('dragover');
});
dropZone.addEventListener('drop', function(e) {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  var f = e.dataTransfer.files[0];
  if (f) onFileSelect(f);
});

function onFileSelect(file) {
  if (!file) return;
  if (!file.name.match(/\.html?$/i)) {
    showToast('Only .html or .htm files are supported');
    return;
  }
  var reader = new FileReader();
  reader.onload = function(e) {
    loadedHTML = e.target.result;
    loadedFile = file;
    document.getElementById('drop-zone').style.display = 'none';
    document.getElementById('file-loaded').classList.add('show');
    document.getElementById('file-loaded-name').textContent = file.name;
    document.getElementById('file-loaded-meta').textContent =
      (file.size / 1024).toFixed(1) + ' KB';
    var base = file.name.replace(/\.html?$/i, '');
    document.getElementById('fname').value = base + '.pdf';
  };
  reader.readAsText(file);
}

function clearFile() {
  loadedFile = null; loadedHTML = '';
  document.getElementById('drop-zone').style.display = '';
  document.getElementById('file-loaded').classList.remove('show');
  document.getElementById('file-input').value = '';
  document.getElementById('fname').value = 'output.pdf';
}

/* ── PostMessage receiver ── */
window.addEventListener('message', function(e) {
  if (!e.data || e.data.type !== 'pdfReady') return;
  if (e.data.bytes) {
    var blob = new Blob([e.data.bytes], { type: 'application/pdf' });
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href     = url;
    a.download = e.data.fname;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(url); }, 60000);
    showToast('PDF downloaded');
  }
  resetBtn();
});

/* ── Capture script ── */
var CDN_SCRIPTS =
  '<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"><\/script>'
+ '<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"><\/script>';

function captureScript(fname, waitMs) {
  if (!waitMs) waitMs = 800;
  return '<script>(function(){'
       + 'var fname=' + JSON.stringify(fname) + ';'
       + 'function t(m){document.title="PDF: "+m;}'
       + 'function sendPDF(pdf,label){'
       +   't("Sending…");'
       +   'var sent=false;'
       +   'if(window.opener&&!window.opener.closed){'
       +     'try{'
       +       'var bytes=pdf.output("arraybuffer");'
       +       'window.opener.postMessage({type:"pdfReady",bytes:bytes,fname:fname},"*");'
       +       'sent=true;'
       +     '}catch(e){}'
       +   '}'
       +   'if(!sent){pdf.save(fname);}'
       +   't(label+" — closing tab…");'
       +   'setTimeout(function(){window.close();},3000);'
       + '}'
       + 'function runCapture(){'
       +   't("Capturing…");'
       +   'var b=document.body,d=document.documentElement;'
       +   'var W=Math.max(d.clientWidth||0,window.innerWidth||0)||1200;'
       +   'var H=Math.max(b.scrollHeight,b.offsetHeight,d.scrollHeight,d.offsetHeight);'
       +   'var meta=document.querySelector("meta[name=viewport]");'
       +   'if(!meta){meta=document.createElement("meta");meta.name="viewport";document.head.appendChild(meta);}'
       +   'meta.content="width="+W+",initial-scale=1";'
       +   'window.scrollTo(0,0);'
       +   'html2canvas(b,{'
       +     'scale:2,useCORS:true,allowTaint:true,backgroundColor:"#ffffff",'
       +     'scrollX:0,scrollY:0,windowWidth:W,windowHeight:H,width:W,height:H,logging:false,'
       +     'ignoreElements:function(el){'
       +       'var s=window.getComputedStyle(el);'
       +       'return s.position==="fixed"||s.position==="sticky";'
       +     '}'
       +   '}).then(function(canvas){'
       +     't("Building PDF…");'
       +     'var iW=canvas.width,iH=canvas.height;'
       +     'var pdf=new window.jspdf.jsPDF({orientation:iW>iH?"l":"p",unit:"px",format:[iW,iH],hotfixes:["px_scaling"]});'
       +     'var imgData;'
       +     'try{imgData=canvas.toDataURL("image/jpeg",0.95);}'
       +     'catch(se){'
       +       't("Retrying without cross-origin images…");'
       +       'html2canvas(b,{'
       +         'scale:2,useCORS:false,allowTaint:false,backgroundColor:"#ffffff",'
       +         'scrollX:0,scrollY:0,windowWidth:W,windowHeight:H,width:W,height:H,logging:false,'
       +         'ignoreElements:function(el){'
       +           'var s=window.getComputedStyle(el);'
       +           'return el.tagName==="IMG"||'
       +                  '(s.backgroundImage!=="none"&&s.position!=="static")||'
       +                  's.position==="fixed"||s.position==="sticky";'
       +         '}'
       +       '}).then(function(c2){'
       +         'var d2=c2.toDataURL("image/jpeg",0.95);'
       +         'var iW2=c2.width,iH2=c2.height;'
       +         'var pdf2=new window.jspdf.jsPDF({orientation:iW2>iH2?"l":"p",unit:"px",format:[iW2,iH2],hotfixes:["px_scaling"]});'
       +         'pdf2.addImage(d2,"JPEG",0,0,iW2,iH2,"","FAST");'
       +         'sendPDF(pdf2,"Done (images skipped)");'
       +       '}).catch(function(e2){t("Error: "+e2.message);});'
       +       'return;'
       +     '}'
       +     'pdf.addImage(imgData,"JPEG",0,0,iW,iH,"","FAST");'
       +     'sendPDF(pdf,"Done ✓");'
       +   '}).catch(function(e){t("Error: "+e.message);});'
       + '}'
       + 'function waitForLibs(cb,n){'
       +   'if(typeof html2canvas!=="undefined"&&typeof window.jspdf!=="undefined"){cb();return;}'
       +   'if(n<=0){t("Error: libraries failed to load");return;}'
       +   'setTimeout(function(){waitForLibs(cb,n-1);},300);'
       + '}'
       + 'window.addEventListener("load",function(){'
       +   't("Preparing…");'
       +   'setTimeout(function(){waitForLibs(runCapture,40);},' + waitMs + ');'
       + '});'
       + '})();<\/script>';
}

function injectAndOpen(html, fname) {
  if (/<head[^>]*>/i.test(html)) {
    html = html.replace(/(<head[^>]*>)/i, '$1' + CDN_SCRIPTS);
  } else {
    html = '<head>' + CDN_SCRIPTS + '</head>' + html;
  }

  var script = captureScript(fname, 800);
  var lo = html.toLowerCase();

  if (lo.indexOf('</body>') !== -1) {
    html = html.replace(/<\/body>/i, script + '</body>');
  } else if (lo.indexOf('</html>') !== -1) {
    html = html.replace(/<\/html>/i, script + '</html>');
  } else {
    html = html + script;
  }

  var blob = new Blob([html], { type: 'text/html' });
  var url  = URL.createObjectURL(blob);
  var win  = window.open(url, '_blank');
  if (!win) {
    showToast('Please allow pop-ups and try again');
    resetBtn();
    return;
  }
  setTimeout(function() { URL.revokeObjectURL(url); }, 180000);
}

function exportPDF() {
  var btn  = document.getElementById('export-btn');
  var html = mode === 'file'
    ? loadedHTML
    : document.getElementById('paste-input').value.trim();

  if (!html) {
    showToast(mode === 'file' ? 'Add a file first' : 'Paste some HTML first');
    return;
  }

  var fname = document.getElementById('fname').value.trim();
  if (!fname) fname = 'output';
  if (!fname.toLowerCase().endsWith('.pdf')) fname += '.pdf';

  if (!btn.dataset.original) btn.dataset.original = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<svg class="spin" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-6.219-8.56" /></svg><span>Rendering…</span>';

  injectAndOpen(html, fname);

  setTimeout(function() { if (btn.disabled) resetBtn(); }, 30000);
}
</script>

</body>
</html>
